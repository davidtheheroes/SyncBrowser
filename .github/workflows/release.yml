name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish (self-contained)
        run: >
          dotnet publish src/SyncBrowser.App/SyncBrowser.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:GenerateDocumentationFile=false

      - name: Keep only EXE
        shell: pwsh
        run: Get-ChildItem ./publish | Where-Object { $_.Name -ne 'SyncBrowser.exe' } | Remove-Item -Force -Recurse

      - name: Create ZIP archive
        run: Compress-Archive -Path ./publish/SyncBrowser.exe -DestinationPath SyncBrowser-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: SyncBrowser-${{ github.ref_name }}-win-x64.zip
